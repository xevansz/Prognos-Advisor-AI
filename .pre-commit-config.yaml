repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: bash -c "cd backend && pdm run ruff check . --fix"
        language: system
        pass_filenames: false

      # - id: mypy
      #   name: mypy
      #   entry: bash -c "cd backend && pdm run python -m mypy ."
      #   language: system
      #   pass_filenames: false

      - id: frontend-eslint
        name: frontend eslint
        entry: bash -c "cd frontend && npm run lint:fix"
        language: system
        pass_filenames: false

      - id: frontend-prettier
        name: frontend prettier
        entry: bash -c "cd frontend && npm run format"
        language: system
        pass_filenames: false

      - id: frontend-tsc
        name: frontend typecheck
        entry: bash -c "cd frontend && npm run check"
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
